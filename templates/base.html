{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AptCourses - Deep-Tech Engineering Hub{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <!-- Prism.js Syntax Highlighting (Dark Theme) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>

    <script type="module">
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
      }
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ startOnLoad: true, theme: savedTheme === 'light' ? 'default' : 'dark' });
    </script>
</head>
<body>
    <nav class="navbar glass-panel">
        <a href="{% url 'user_dashboard' %}" class="nav-brand" style="text-decoration: none; color: inherit;">
            Apt<span>Courses</span>
        </a>
        <div class="nav-links" style="display: flex; align-items: center;">
            <a href="#">Catalog</a>
            <a href="#">Corporate Training</a>
            <a href="#">Sign In</a>
            <button id="theme-toggle" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-left: 1rem;" title="Toggle Dark/Light Mode">
                🌗
            </button>
        </div>
    </nav>

    <script>
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            // Optional: reload to re-render Mermaid diagrams in the correct theme
            // window.location.reload(); 
        });
    </script>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 AptComputing Labs. Affordable Technical Training.</p>
    </footer>
</body>
</html>
